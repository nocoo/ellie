name = "ellie"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "tongjinet-db"
database_id = "2b4bbcda-6a08-45bf-bbde-badfa4d73c8f"

[[kv_namespaces]]
binding = "KV"
id = "9506856500c34ceb82ab989063962a6d"
preview_id = "490227e961174fd38c6c14530a4ee3ee"

[[r2_buckets]]
binding = "R2"
bucket_name = "tongjinet"

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://ellie.nocoo.cloud,https://ellie.worker.hexly.ai"
# Cloudflare Turnstile keys (docs/17 §7.2.1 — rev4).
# Production keys MUST be set by ops BEFORE Phase 3c production cutover:
#   - TURNSTILE_SITE_KEY: add real site key here (plain var; frontend reads it).
#   - TURNSTILE_SECRET_KEY: set via `wrangler secret put TURNSTILE_SECRET_KEY`.
# Until both are in place the request-code endpoint fails closed
# (verifyTurnstileToken returns success=false → 403 CAPTCHA_INVALID), so no
# verification email is sent and no real users are affected. Phase 5b write
# enforcement is gated separately, so missing keys here cannot leak access.

[triggers]
crons = ["*/5 * * * *"]

# ─── Test Environment ───────────────────────────────────────────
# D1 Isolation: L2/L3 tests MUST use [env.test] to avoid touching production data.
# Run with: wrangler dev --env test --remote
# Ref: 6DQ D1 维度 — 测试资源物理隔离

[env.test]
name = "ellie-test"

[[env.test.d1_databases]]
binding = "DB"
database_name = "tongjinet-db-test"
database_id = "940c7758-0a9e-44b2-aeb5-745fa3143371"

[[env.test.kv_namespaces]]
binding = "KV"
id = "490227e961174fd38c6c14530a4ee3ee"
preview_id = "490227e961174fd38c6c14530a4ee3ee"

[[env.test.r2_buckets]]
binding = "R2"
bucket_name = "tongjinet-test"
preview_bucket_name = "tongjinet-test"

[env.test.vars]
ENVIRONMENT = "test"
ALLOWED_ORIGINS = "*"
# Cloudflare Turnstile always-pass test keys (docs/17 §7.2.1).
# Both site key and secret are publicly documented "always pass" values —
# they let the frontend widget render and let `siteverify` succeed without
# any real outbound dependency. They MUST never be used in production.
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"
TURNSTILE_SECRET_KEY = "1x0000000000000000000000000000000AA"
