name = "ellie"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "tongjinet-db"
database_id = "2b4bbcda-6a08-45bf-bbde-badfa4d73c8f"

[[kv_namespaces]]
binding = "KV"
id = "9506856500c34ceb82ab989063962a6d"
preview_id = "490227e961174fd38c6c14530a4ee3ee"

[[r2_buckets]]
binding = "R2"
bucket_name = "tongjinet"

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://ellie.worker.hexly.ai"

# Dove email relay (docs/17 §8). Webhook = `${DOVE_BASE_URL}/api/webhook/${DOVE_PROJECT_ID}/send`.
# Only the BASE_URL / PROJECT_ID / TEMPLATE_SLUG are tracked vars; the bearer
# token is a secret and MUST be set out-of-band:
#   wrangler secret put DOVE_WEBHOOK_TOKEN
# Until the secret is in place sendDoveEmail returns
# `{ ok: false, code: "dove_not_configured" }`, so request-code reports
# EMAIL_PROVIDER_FAILED and never persists a code — fail-closed.
DOVE_BASE_URL = "https://dove.hexly.ai"
DOVE_PROJECT_ID = "vKOrSPha4wtzkWlJSAV8d"
DOVE_TEMPLATE_SLUG = "verify-email"

[triggers]
crons = ["*/5 * * * *"]

# ─── Test Environment ───────────────────────────────────────────
# D1 Isolation: L2/L3 tests MUST use [env.test] to avoid touching production data.
# Run with: wrangler dev --env test --remote
# Ref: 6DQ D1 维度 — 测试资源物理隔离

[env.test]
name = "ellie-test"

[[env.test.d1_databases]]
binding = "DB"
database_name = "tongjinet-db-test"
database_id = "940c7758-0a9e-44b2-aeb5-745fa3143371"

[[env.test.kv_namespaces]]
binding = "KV"
id = "490227e961174fd38c6c14530a4ee3ee"
preview_id = "490227e961174fd38c6c14530a4ee3ee"

[[env.test.r2_buckets]]
binding = "R2"
bucket_name = "tongjinet-test"
preview_bucket_name = "tongjinet-test"

[env.test.vars]
ENVIRONMENT = "test"
ALLOWED_ORIGINS = "*"
# Dove (docs/17 §8). Test env points at the real base URL but the worker
# only reaches dove inside unit tests with mocked fetch — there is no real
# outbound call from the L2 suite (handlers/email tests use vi.mock on
# `src/lib/dove`). The token is intentionally a placeholder; production
# uses `wrangler secret put DOVE_WEBHOOK_TOKEN` against [env=production].
DOVE_BASE_URL = "https://dove.hexly.ai"
DOVE_PROJECT_ID = "vKOrSPha4wtzkWlJSAV8d"
DOVE_TEMPLATE_SLUG = "verify-email"
DOVE_WEBHOOK_TOKEN = "test-token-not-real"
