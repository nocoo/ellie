[package]
name = "ellie-tui"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[[bin]]
name = "ellie-tui"
path = "src/main.rs"

[dependencies]
ellie-core = { path = "../ellie-core" }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
ratatui = "0.30"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
