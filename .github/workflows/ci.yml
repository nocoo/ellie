name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.4
    with:
      test-command: "bun run test"
      typecheck-command: "bun run typecheck"
      lint-command: "bun run lint"
    secrets: inherit

  security-scan:
    name: "G2 Security Scan (OSV)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: "Install osv-scanner"
        run: |
          curl -sSL -o /tmp/osv-scanner \
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
      - name: "Scan bun.lock for known vulnerabilities"
        run: osv-scanner scan --lockfile bun.lock
      - name: "Scan Cargo.lock (Rust CLI)"
        if: hashFiles('packages/cli-rs/Cargo.lock') != ''
        run: osv-scanner scan --lockfile packages/cli-rs/Cargo.lock

  api-e2e:
    name: "L2 API E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: "L2: API E2E tests"
        run: bun run test:e2e:api
        env:
          CI: "true"

  browser-e2e:
    name: "L3 Browser E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    # L3 is fully local: scripts/run-l3.ts boots `wrangler dev --local` against
    # an isolated D1/KV persist dir (.wrangler/state/l3) and points the Next
    # dev server at it. No remote test Worker / remote D1 deploy / remote seed
    # required — Cloudflare creds and WORKER_URL_TEST / JWT_SECRET /
    # AUTH_SECRET / FORUM_API_KEY are intentionally NOT plumbed into this job.
    # Test secrets are hard-coded constants inside scripts/lib/l3-local-worker.ts
    # and injected via wrangler `--var` at start-time.
    env:
      TZ: Asia/Shanghai
      NEXT_PUBLIC_CAP_API_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CAP_API_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bunx playwright install --with-deps chromium
      - name: "L3: Playwright E2E tests (forum + admin BDD)"
        run: bun run test:e2e:bdd
