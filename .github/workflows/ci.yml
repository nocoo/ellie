name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.4
    with:
      test-command: "bun run test"
      typecheck-command: "bun run typecheck"
      lint-command: "bun run lint"
    secrets: inherit

  security-scan:
    name: "G2 Security Scan (OSV)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: "Install osv-scanner"
        run: |
          curl -sSL -o /tmp/osv-scanner \
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
      - name: "Scan bun.lock for known vulnerabilities"
        run: osv-scanner scan --lockfile bun.lock
      - name: "Scan Cargo.lock (Rust CLI)"
        if: hashFiles('packages/cli-rs/Cargo.lock') != ''
        run: osv-scanner scan --lockfile packages/cli-rs/Cargo.lock

  api-e2e:
    name: "L2 API E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: "L2: API E2E tests"
        run: bun run test:e2e:api
        env:
          CI: "true"

  browser-e2e:
    name: "L3 Browser E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      TZ: Asia/Shanghai
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      D1_TEST_DATABASE_ID: ${{ secrets.D1_TEST_DATABASE_ID }}
      WORKER_URL_TEST: ${{ secrets.WORKER_URL_TEST }}
      WORKER_API_URL: ${{ secrets.WORKER_URL_TEST }}
      API_KEY: ${{ secrets.API_KEY }}
      FORUM_API_KEY: ${{ secrets.API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXT_PUBLIC_CAP_API_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CAP_API_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bunx playwright install --with-deps chromium
      - name: "Apply D1 migrations to test DB"
        run: bun x wrangler d1 migrations apply DB --env test --remote -c apps/worker/wrangler.toml
      # Best-effort: deploy the [env.test] worker BEFORE seeding so the L3
      # specs run against worker code matching main HEAD. The SSR fallback
      # in apps/web/src/viewmodels/forum/thread-detail.server.ts is the
      # primary correctness guard; this step is an *optimization* that keeps
      # the deployed test worker in sync when CI has the right CF token.
      #
      # Why `continue-on-error: true`:
      #   - The CI `CLOUDFLARE_API_TOKEN` historically only carries D1 +
      #     KV-read scopes (enough for `wrangler d1 migrations apply` and
      #     reads from the L2 worker), NOT `Workers Scripts:Edit` or
      #     `Workers KV Storage:Edit`. Without those, deploy fails with
      #     `code: 10023 kv bindings require kv write perms`.
      #   - Deploy permission drift must NOT block seed + L3. The SSR
      #     fallback already lets L3 pass against a stale worker; we'd
      #     rather see the test result than fail-stop on an infra gap.
      #   - When @zheng-li expands the token scope to include
      #     Workers Scripts:Edit + Workers KV Storage:Edit, this step
      #     starts succeeding silently — no further CI changes needed.
      #
      # The env-presence guard remains so jobs without any CF token (e.g.
      # an accidentally cleared secret) skip the step entirely.
      - name: "Deploy ellie-test worker (best-effort; needs Workers+KV write scope)"
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        continue-on-error: true
        run: bun x wrangler deploy --env test -c apps/worker/wrangler.toml
      - name: "Seed test D1 (forum/thread/user fixtures)"
        run: bun x wrangler d1 execute tongjinet-db-test --remote -c apps/worker/wrangler.toml --file scripts/seed-test-db.sql
      - name: "L3: Playwright E2E tests"
        run: bun run test:e2e:browser
