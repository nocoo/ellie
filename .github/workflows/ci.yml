name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.1
    with:
      test-command: "bun run test"
      typecheck-command: "bun run typecheck"
      lint-command: "bun run lint"
    secrets: inherit

  api-e2e:
    name: "L2 API E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: "L2: API E2E tests"
        run: bun run test:e2e:api
        env:
          CI: "true"

  browser-e2e:
    name: "L3 Browser E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      TZ: Asia/Shanghai
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      D1_TEST_DATABASE_ID: ${{ secrets.D1_TEST_DATABASE_ID }}
      WORKER_URL_TEST: ${{ secrets.WORKER_URL_TEST }}
      WORKER_API_URL: ${{ secrets.WORKER_URL_TEST }}
      API_KEY: ${{ secrets.API_KEY }}
      FORUM_API_KEY: ${{ secrets.API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: "Apply D1 migrations to test DB"
        run: bun x wrangler d1 migrations apply DB --env test --remote -c apps/worker/wrangler.toml
      # Deploy the [env.test] worker BEFORE seeding so the L3 specs run
      # against worker code that matches the current main HEAD. Without this
      # the deployed test worker can drift behind main (CI never used to
      # touch it), causing routes added on main — e.g. POST /api/v1/post-comments/batch
      # — to 404 in CI even though the source is present, which manifests
      # as silent SSR data-path failures (see fix(web/ssr) commit on this
      # task).
      #
      # Guarded so the job still runs when CF secrets are absent (e.g. fork
      # PRs that already skip via the job-level `if:`, or accidental secret
      # rotation). The fork-PR case is already excluded above; this guard is
      # a belt-and-braces against missing secrets in the trusted path.
      - name: "Deploy ellie-test worker (only when CF secrets present)"
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: bun x wrangler deploy --env test -c apps/worker/wrangler.toml
      - name: "Seed test D1 (forum/thread/user fixtures)"
        run: bun x wrangler d1 execute tongjinet-db-test --remote -c apps/worker/wrangler.toml --file scripts/seed-test-db.sql
      - name: "L3: Playwright E2E tests"
        run: bun run test:e2e:browser
